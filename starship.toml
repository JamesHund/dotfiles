format = """
[î‚¶](#504945)[ $time ](bg:#504945 fg:#ebdbb2)[î‚°](fg:#504945 bg:#458588)[ $username](bg:#458588 fg:#282828)[î‚°](fg:#458588 bg:#d79921)[ $directory ](bg:#d79921 fg:#282828)([î‚°](fg:#d79921 bg:#98971a)[ $git_branch$git_status ](bg:#98971a fg:#282828))([î‚°](fg:#98971a bg:#b16286)[ $conda ](bg:#b16286 fg:#282828)[î‚´](#b16286))${custom.tail_repo}${custom.tail_no_repo} $character"""
command_timeout = 5000

[username]
show_always = true
style_user = "bg:#458588 fg:#282828"
style_root = "bg:#458588 fg:#282828"
format = "[$user ]($style)"

[directory]
style = "bg:#d79921 fg:#282828"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "î‚  "

[git_branch]
symbol = "îśĄ "
style = "bg:#98971a fg:#282828"
format = "[$symbol$branch ]($style)"

[git_status]
style = "bg:#98971a fg:#282828"
format = "[$all_status$ahead_behind]($style)"

[conda]
symbol = " "
style = "bg:#b16286 fg:#282828"
format = "[$symbol$environment ]($style)"
ignore_base = true

[time]
disabled = false
time_format = "%R"
style = "bg:#504945 fg:#ebdbb2"
format = "[$time]($style)"

[character]
success_symbol = "[âťŻ](bold fg:#b8bb26)"
error_symbol = "[âťŻ](bold fg:#fb4934)"

[custom.tail_repo]
when = '([ -z "$CONDA_DEFAULT_ENV" ] || [ "$CONDA_DEFAULT_ENV" = "base" ]) && git rev-parse --is-inside-work-tree > /dev/null 2>&1'
command = "true"
format = "[î‚´](#98971a)"

[custom.tail_no_repo]
when = '([ -z "$CONDA_DEFAULT_ENV" ] || [ "$CONDA_DEFAULT_ENV" = "base" ]) && ! git rev-parse --is-inside-work-tree > /dev/null 2>&1'
command = "true"
format = "[î‚´](#d79921)"
