format = """
[Óā∂](#458588)[ $username](bg:#458588 fg:#282828)[Óāį](fg:#458588 bg:#d79921)[ $directory ](bg:#d79921 fg:#282828)[Óāį](fg:#d79921 bg:#98971a)[ $git_branch$git_status](bg:#98971a fg:#282828)[Óāį](fg:#98971a bg:#504945)[ $time ](bg:#504945 fg:#ebdbb2)[Óāī](#504945) $character"""
command_timeout = 5000

[username]
show_always = true
style_user = "bg:#458588 fg:#282828"
style_root = "bg:#458588 fg:#282828"
format = "[$user ]($style)"

[directory]
style = "bg:#d79921 fg:#282828"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = ".../"

[git_branch]
symbol = " "
style = "bg:#98971a fg:#282828"
format = "[$symbol$branch ]($style)"

[git_status]
style = "bg:#98971a fg:#282828"
format = "[$all_status$ahead_behind]($style)"

[time]
disabled = false
time_format = "%R"
style = "bg:#504945 fg:#ebdbb2"
format = "[$time]($style)"

[character]
success_symbol = "[‚ĚĮ](bold fg:#b8bb26)"
error_symbol = "[‚ĚĮ](bold fg:#fb4934)"
